<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Check Passport Status</title>
    <link rel="stylesheet" href="../css/UserCheckStatus.css">
</head>
<body>
    <div class="container">
        <h2>Check Passport Application Status</h2>
        <form id="statusForm">
            <label for="userid">Enter User Id:</label>
            <input type="text" id="userid" name="userid" placeholder="Enter your User id" required>
            <button type="submit">Check Status</button>
        </form>

        <div id="statusResult" class="hidden">
            <h3>Application Status</h3>
            <p><strong>User Id:</strong> <span id="displayUserId"></span></p>
            <p><strong>Status:</strong> <span id="displayStatus"></span></p>
        </div>
    </div>

    <script>
        document.getElementById('statusForm').addEventListener('submit', function(event) {
            event.preventDefault();  // Prevent form from submitting traditionally
            checkStatus();  // Call the function to check the status

            async function checkStatus() {
                const userid = document.getElementById('userid').value.trim();  // Get the user id entered by the user

                if (!userid) {
                    alert('Please enter your user id.');
                    return;
                }

                // Send the user id to the backend to fetch status
                try {
                    const response = await fetch(`http://localhost:3000/UserCheckStatus/${userid}`, {
                        method: 'GET',
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (!response.ok) {
                        throw new Error('User ID not found.');
                    }

                    const data = await response.json();

                    // Display the live status and user ID
                    document.getElementById('displayUserId').textContent = data.userid || 'N/A';
                    document.getElementById('displayStatus').textContent = data.status || 'Pending';

                    // Show the result section by removing the 'hidden' class
                    document.getElementById('statusResult').classList.remove('hidden');
                } catch (error) {
                    console.error('Error:', error);
                    alert(error.message || 'Something went wrong. Please try again.');
                }
            }
        });
    </script>
</body>
</html>
