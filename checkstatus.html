<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Passport Status</title>
    <link rel="stylesheet" href="../css/Admincheckstatus.css">
</head>
<body>
    <div class="container">
        <h2>Check Passport Application Status</h2>
        <form id="statusForm">
            <label for="userid">Enter User Id:</label>
            <input type="text" id="useridInput" name="userid" placeholder="Enter User Id" required>
            <button type="submit">Check Status</button>
        </form>

        <div id="statusResult" class="hidden">
            <h3>Application Status</h3>
            <p><strong>User Id:</strong> <span id="userIdDisplay"></span></p>
            <p><strong>Status:</strong> <span id="statusDisplay"></span></p>
            <button id="getDetails" onclick="saveUserIdAndRedirect()">Get Details</button>
        </div>
    </div>
    
    <script>
        document.getElementById('statusForm').addEventListener('submit', function(event) {
            event.preventDefault();
            checkStatus();
        });

        async function checkStatus() {
            const userid = document.getElementById('useridInput').value.trim();

            if (!userid) {
                alert('Please enter your user id.');
                return;
            }

            try {
                const response = await fetch(`http://localhost:3000/checkstatus/${userid}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error('User ID not found.');
                }

                const data = await response.json();

                document.getElementById('userIdDisplay').textContent = data.userid || 'N/A';
                document.getElementById('statusDisplay').textContent = data.status || 'Pending';

                document.getElementById('statusResult').classList.remove('hidden');
            } catch (error) {
                console.error('Error:', error);
                alert(error.message || 'Something went wrong. Please try again.');
            }
        }

        function saveUserIdAndRedirect() {
            const userId = document.getElementById('userIdDisplay').textContent;
            localStorage.setItem('userId', userId);
            window.location.href = "verification.html";
        }
    </script>
</body>
</html>
